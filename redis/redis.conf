# ==============================================
# 基础网络配置（Docker环境专用）
# ==============================================
# 允许所有IP访问（仅Docker内部网络，外部无法直接访问）
bind 0.0.0.0
# Redis默认端口
port 6379
# 客户端空闲超时时间（0表示不超时）
timeout 0
# TCP保活时间
tcp-keepalive 300
# 保护模式（开启后必须设置密码才能远程访问）
protected-mode yes

# ==============================================
# 安全配置（核心，防止未授权访问）
# ==============================================
# 密码占位符（会被docker-compose.yml中的环境变量自动覆盖）
# 实际密码在 .env 文件的 REDIS_PASSWORD 中修改
requirepass ${REDIS_PASSWORD}
# 禁用危险命令（防止误操作删除数据）
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""

# ==============================================
# 数据持久化配置（必开，防止容器重启数据丢失）
# ==============================================
# RDB快照持久化（默认开启，按时间间隔保存数据）
# 格式：save 秒数 改动次数
save 900 1      # 900秒内有1次改动就保存
save 300 10     # 300秒内有10次改动就保存
save 60 10000   # 60秒内有10000次改动就保存
# 开启RDB文件压缩
rdbcompression yes
# RDB文件名
dbfilename dump.rdb
# 数据保存目录（必须和docker-compose挂载的目录一致）
dir /data

# AOF追加持久化（更高可靠性，推荐开启）
appendonly yes
# AOF文件名
appendfilename "appendonly.aof"
# 每秒同步一次（性能和可靠性平衡）
appendfsync everysec
# 自动重写AOF文件（防止文件过大）
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ==============================================
# 日志配置
# ==============================================
# 日志级别（debug/verbose/notice/warning）
loglevel notice
# 日志文件路径（挂载到宿主机，方便排查问题）
logfile /var/log/redis/redis-server.log

# ==============================================
# 内存管理配置（适配毕设项目资源）
# ==============================================
# 最大内存占用（会被.env中的REDIS_MEMORY自动覆盖）
maxmemory ${REDIS_MEMORY}
# 内存满时的淘汰策略：优先删除最近最少使用的键
maxmemory-policy allkeys-lru
# 淘汰键时每次采样的数量
maxmemory-samples 5

# ==============================================
# 其他优化配置
# ==============================================
# 后台运行（Docker中必须关闭，否则容器会立即退出）
daemonize no
# 关闭Redis的守护进程模式
supervised no
# 禁用Redis内置的Sentinel和集群功能（毕设用不到）
sentinel no
cluster-enabled no