version: '3.8'

services:
  # 1. MySQL 数据库（必用）
  mysql:
    image: mysql:8.0
    container_name: ciccas_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: cicdb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. Redis 缓存（必用）
  redis:
    image: redis:7
    container_name: ciccas_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. 你的核心项目（已构建成功）
  app:
    build: ./app
    container_name: ciccas_app
    restart: always
    ports:
      - "8501:8501"
    depends_on:
      - mysql
      - redis
    env_file:
      - .env
    command: streamlit run main.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
  # 4. Nginx 代理（必用）
  nginx:
    image: nginx:latest
    container_name: ciccas_nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - app

  # 5. 数据库管理面板（必用）
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ciccas_phpmyadmin
    restart: always
    ports:
      - "8099:80"
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
    depends_on:
      - mysql

volumes:
  mysql_data:
  redis_data:

networks:
  default: